<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - College Management System</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Background -->
    <div class="login-background">
        <div class="background-overlay"></div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <!-- Login Card -->
        <div class="login-card">
            <!-- Logo Section -->
            <div class="login-logo">
                <div class="logo-circle">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1>College Management System</h1>
                <p>Secure Login Portal</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="loginUsername">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <input type="text" id="loginUsername" name="username" required 
                           placeholder="Enter your username" autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="loginPassword">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <div class="password-input">
                        <input type="password" id="loginPassword" name="password" required 
                               placeholder="Enter your password" autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="rememberMe" name="remember">
                        <label for="rememberMe">Remember me</label>
                    </div>
                    <a href="#" onclick="showForgotPassword()">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <!-- Register Link -->
            <div class="register-link">
                <p>Don't have an account? <a href="#" onclick="showRegisterForm()">Register here</a></p>
            </div>

            <!-- System Info -->
            <div class="system-info">
                <p><i class="fas fa-shield-alt"></i> Secure Authentication</p>
                <p><i class="fas fa-lock"></i> Encrypted Connection</p>
            </div>
        </div>

        <!-- Register Card (Initially Hidden) -->
        <div class="login-card" id="registerCard" style="display: none;">
            <div class="login-logo">
                <div class="logo-circle">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1>Create Account</h1>
                <p>Join College Management System</p>
            </div>

            <form id="registerForm" class="login-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="registerFullName">
                            <i class="fas fa-user"></i> Full Name
                        </label>
                        <input type="text" id="registerFullName" name="full_name" 
                               placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label for="registerUsername">
                            <i class="fas fa-user-tag"></i> Username *
                        </label>
                        <input type="text" id="registerUsername" name="username" required 
                               placeholder="Choose a username" autocomplete="username">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="registerEmail">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <input type="email" id="registerEmail" name="email" 
                               placeholder="your.email@example.com" autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="registerRole">
                            <i class="fas fa-user-shield"></i> Role *
                        </label>
                        <select id="registerRole" name="role" required>
                            <option value="">Select Role</option>
                            <option value="student">Student</option>
                            <option value="faculty">Faculty</option>
                            <option value="hod">Head of Department</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="registerDepartment">
                        <i class="fas fa-building"></i> Department *
                    </label>
                    <select id="registerDepartment" name="department" required>
                        <option value="">Select Department</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Electrical">Electrical</option>
                        <option value="Mechanical">Mechanical</option>
                        <option value="Civil">Civil</option>
                        <option value="Chemical">Chemical</option>
                        <option value="Physics">Physics</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Mathematics">Mathematics</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="registerPassword">
                            <i class="fas fa-lock"></i> Password *
                        </label>
                        <div class="password-input">
                            <input type="password" id="registerPassword" name="password" required 
                                   placeholder="Create password" autocomplete="new-password">
                            <button type="button" class="password-toggle" onclick="togglePassword('registerPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="registerConfirmPassword">
                            <i class="fas fa-lock"></i> Confirm Password *
                        </label>
                        <div class="password-input">
                            <input type="password" id="registerConfirmPassword" name="confirm_password" required 
                                   placeholder="Confirm password" autocomplete="new-password">
                            <button type="button" class="password-toggle" onclick="togglePassword('registerConfirmPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="password-strength" id="passwordStrength">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <span class="strength-text" id="strengthText">Password strength</span>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="register-link">
                <p>Already have an account? <a href="#" onclick="showLoginForm()">Login here</a></p>
            </div>
        </div>
    </div>

    <!-- Alert/Notification Container -->
    <div id="alertContainer" class="alert-container"></div>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script>
        // Page-specific functionality
        document.addEventListener('DOMContentLoaded', function() {
            // Check if user is already logged in
            checkExistingSession();
            
            // Form event listeners
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('registerForm').addEventListener('submit', handleRegister);
            
            // Password strength checker
            document.getElementById('registerPassword').addEventListener('input', function() {
                checkPasswordStrength(this.value);
            });
        });

        function checkExistingSession() {
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                // User is logged in, redirect to dashboard
                window.location.href = 'dashboard.html';
            }
        }

        function showLoginForm() {
            document.getElementById('registerCard').style.display = 'none';
            document.querySelector('.login-card').style.display = 'block';
        }

        function showRegisterForm() {
            document.querySelector('.login-card').style.display = 'none';
            document.getElementById('registerCard').style.display = 'block';
        }

        function showForgotPassword() {
            showAlert('Password reset feature coming soon!', 'info');
        }

        async function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showAlert('Please enter both username and password', 'error');
                return;
            }
            
            const loginBtn = document.getElementById('loginBtn');
            setLoading(loginBtn, true);
            
            try {
                const response = await fetch('http://127.0.0.1:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('currentUser', JSON.stringify(data.data.user));
                    showAlert('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showAlert(data.message || 'Login failed', 'error');
                }
            } catch (error) {
                showAlert('Login failed: ' + error.message, 'error');
            } finally {
                setLoading(loginBtn, false);
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            
            const formData = {
                username: document.getElementById('registerUsername').value.trim(),
                password: document.getElementById('registerPassword').value,
                confirm_password: document.getElementById('registerConfirmPassword').value,
                full_name: document.getElementById('registerFullName').value.trim(),
                email: document.getElementById('registerEmail').value.trim(),
                role: document.getElementById('registerRole').value,
                department: document.getElementById('registerDepartment').value
            };
            
            // Validation
            if (!formData.username || !formData.password || !formData.role || !formData.department) {
                showAlert('Please fill in all required fields', 'error');
                return;
            }
            
            if (formData.password !== formData.confirm_password) {
                showAlert('Passwords do not match', 'error');
                return;
            }
            
            if (formData.password.length < 6) {
                showAlert('Password must be at least 6 characters long', 'error');
                return;
            }
            
            const registerBtn = document.getElementById('registerBtn');
            setLoading(registerBtn, true);
            
            try {
                const response = await fetch('http://127.0.0.1:5000/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('Registration successful! Please login.', 'success');
                    setTimeout(() => {
                        showLoginForm();
                    }, 2000);
                } else {
                    showAlert(data.message || 'Registration failed', 'error');
                }
            } catch (error) {
                showAlert('Registration failed: ' + error.message, 'error');
            } finally {
                setLoading(registerBtn, false);
            }
        }

        function setLoading(element, loading) {
            if (loading) {
                element.disabled = true;
                element.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            } else {
                element.disabled = false;
                if (element.id === 'loginBtn') {
                    element.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                } else if (element.id === 'registerBtn') {
                    element.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                }
            }
        }

        function checkPasswordStrength(password) {
            const strengthFill = document.getElementById('strengthFill');
            const strengthText = document.getElementById('strengthText');
            
            if (!strengthFill || !strengthText) return;
            
            let strength = 0;
            let color = '#dc3545';
            let text = 'Very Weak';
            
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            const strengthLevels = ['', 'Very Weak', 'Weak', 'Fair', 'Good', 'Strong', 'Very Strong'];
            const strengthColors = ['#dc3545', '#dc3545', '#ffc107', '#ffc107', '#28a745', '#28a745', '#20c997'];
            const strengthWidths = ['0%', '16.66%', '33.33%', '50%', '66.66%', '83.33%', '100%'];
            
            strengthFill.style.width = strengthWidths[strength];
            strengthFill.style.backgroundColor = strengthColors[strength];
            strengthText.textContent = strengthLevels[strength] || 'Password strength';
        }
    </script>

    <style>
        /* Login-specific styles */
        .login-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: -2;
        }

        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff" fill-opacity="0.1" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,138.7C960,139,1056,117,1152,112C1248,107,1344,117,1392,122.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat bottom;
            background-size: cover;
            z-index: -1;
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            color: white;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .login-logo h1 {
            color: #667eea;
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .login-logo p {
            color: #6c757d;
            font-size: 1rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .password-input {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #667eea;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .form-options a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .form-options a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }

        .register-link p {
            color: #6c757d;
            font-size: 0.9rem;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .register-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .system-info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .system-info p {
            color: #6c757d;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .password-strength {
            margin-top: 10px;
        }

        .strength-bar {
            width: 100%;
            height: 6px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .strength-fill {
            height: 100%;
            transition: all 0.3s ease;
            border-radius: 10px;
        }

        .strength-text {
            font-size: 0.85rem;
            color: #6c757d;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .system-info {
                flex-direction: column;
                gap: 10px;
            }
            
            .form-options {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
        }
    </style>
</body>
</html>
